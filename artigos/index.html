  <link rel="stylesheet" href="/shared.css">
  <style>
    main { max-width: 780px; margin: 0 auto; padding: 2rem 1rem 4rem; }

    #grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
      gap: 1.25rem;
    }

    .article-card {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 12px;
      overflow: hidden;
      text-decoration: none;
      color: var(--text);
      display: flex;
      flex-direction: column;
      transition: box-shadow .15s;
    }

    .article-card:hover { box-shadow: 0 4px 20px rgba(255, 214, 0, 0.15); }

    .article-card img {
      width: 100%;
      height: 180px;
      object-fit: cover;
      background: var(--bg);
    }

    .article-card .no-img {
      width: 100%;
      height: 180px;
      background: var(--bg);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 2.5rem;
    }

    .article-card .body {
      padding: 1rem;
      flex: 1;
      display: flex;
      flex-direction: column;
    }

    .article-card h2 {
      font-size: 1rem;
      font-weight: 700;
      line-height: 1.4;
      margin-bottom: 0.4rem;
    }

    .article-card p {
      font-size: 0.85rem;
      color: var(--muted);
      line-height: 1.5;
      flex: 1;
    }

    .article-card .meta {
      margin-top: 0.75rem;
      font-size: 0.75rem;
      color: var(--muted);
    }

    #status {
      text-align: center;
      padding: 3rem 1rem;
      color: var(--muted);
      font-size: 0.9rem;
    }

    .cat-nav { display: flex; gap: 8px; flex-wrap: wrap; margin-bottom: 1.75rem; }
    .cat-chip { font-size: 0.8rem; font-weight: 600; padding: 5px 14px; border-radius: 20px; text-decoration: none; background: var(--card); border: 1px solid var(--border); color: var(--muted); transition: all .15s; }
    .cat-chip:hover { border-color: #FFD600; color: var(--text); }
    .cat-chip.active { background: #FFD600; border-color: #FFD600; color: #111; }
  </style>
</head>
<body>

  <p>As melhores ofertas selecionadas para voce</p>

<main>
  <div class="cat-nav">
    <a href="/artigos/" class="cat-chip active">Todos</a>
    <a href="/artigos/categoria/casa/" class="cat-chip">Casa</a>
    <a href="/artigos/categoria/ferramentas/" class="cat-chip">Ferramentas</a>
    <a href="/artigos/categoria/games/" class="cat-chip">Games</a>
    <a href="/artigos/categoria/smartphones/" class="cat-chip">Smartphones</a>
    <a href="/artigos/categoria/tablets/" class="cat-chip">Tablets</a>
    <a href="/artigos/categoria/tecnologia/" class="cat-chip">Tecnologia</a>
  </div>
  <div id="grid"></div>
  <div id="status">Carregando...</div>
</main>

<script>
  async function load() {
    try {
      const res = await fetch('/artigos.json');
      const articles = await res.json();

      const status = document.getElementById('status');
      const grid   = document.getElementById('grid');

      if (!articles.length) {
        status.textContent = 'Nenhum artigo publicado ainda.';
        return;
      }

      status.style.display = 'none';
      grid.innerHTML = articles.map(a => `
        <a class="article-card" href="/artigos/${a.slug}/">
          ${a.image
            ? `<img src="${a.image}" alt="${a.title}" loading="lazy">`
            : `<div class="no-img">📝</div>`
          }
          <div class="body">
            <h2>${a.title}</h2>
            <p>${a.description || ''}</p>
            <div class="meta">${a.date ? new Date(a.date + 'T12:00:00').toLocaleDateString('pt-BR') : ''}</div>
          </div>
        </a>
      `).join('');
    } catch (e) {
      document.getElementById('status').textContent = 'Erro ao carregar artigos.';
    }
  }

  load();
</script>
