<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Promopobre Admin</title>
  <link rel="stylesheet" href="https://unpkg.com/easymde/dist/easymde.min.css">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: system-ui, -apple-system, sans-serif;
      background: #f4f4f5;
      color: #18181b;
      min-height: 100vh;
    }

    /* Login */
    #login-view {
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
    }

    .login-box {
      background: #fff;
      border: 1px solid #e4e4e7;
      border-radius: 12px;
      padding: 40px;
      width: 100%;
      max-width: 360px;
    }

    .login-box h1 {
      font-size: 1.25rem;
      font-weight: 700;
      margin-bottom: 24px;
      color: #18181b;
    }

    /* Admin */
    #admin-view { display: none; }

    header {
      background: #18181b;
      color: #fff;
      padding: 14px 24px;
      display: flex;
      align-items: center;
      justify-content: space-between;
    }

    header span { font-weight: 700; font-size: 1rem; }

    main { max-width: 900px; margin: 0 auto; padding: 24px 16px; }

    /* Cards de secao */
    .card {
      background: #fff;
      border: 1px solid #e4e4e7;
      border-radius: 10px;
      padding: 20px;
      margin-bottom: 20px;
    }

    .card h2 { font-size: 0.95rem; font-weight: 600; margin-bottom: 16px; color: #52525b; text-transform: uppercase; letter-spacing: .05em; }

    /* Formularios */
    .form-row { display: flex; gap: 10px; flex-wrap: wrap; }
    .form-group { display: flex; flex-direction: column; gap: 6px; flex: 1; min-width: 200px; }
    .form-group label { font-size: 0.8rem; font-weight: 500; color: #52525b; }

    input[type="text"], input[type="password"], input[type="url"] {
      border: 1px solid #d4d4d8;
      border-radius: 6px;
      padding: 8px 12px;
      font-size: 0.9rem;
      width: 100%;
      outline: none;
      transition: border-color .15s;
    }

    input:focus { border-color: #18181b; }

    /* Botoes */
    button {
      border: none;
      border-radius: 6px;
      padding: 9px 18px;
      font-size: 0.875rem;
      font-weight: 600;
      cursor: pointer;
      transition: opacity .15s;
    }

    button:hover { opacity: 0.85; }
    button:disabled { opacity: 0.5; cursor: not-allowed; }

    .btn-primary { background: #18181b; color: #fff; }
    .btn-danger  { background: #ef4444; color: #fff; padding: 5px 12px; font-size: 0.8rem; }
    .btn-ghost   { background: transparent; color: #a1a1aa; font-weight: 400; padding: 0; }

    .btn-add { margin-top: 12px; }

    /* Lista de produtos */
    #search { width: 100%; margin-bottom: 14px; }

    #product-list { display: flex; flex-direction: column; gap: 10px; }

    .product-item {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 12px;
      border: 1px solid #e4e4e7;
      border-radius: 8px;
      background: #fafafa;
    }

    .product-item img {
      width: 56px;
      height: 56px;
      object-fit: cover;
      border-radius: 6px;
      flex-shrink: 0;
      background: #e4e4e7;
    }

    .product-item .no-img {
      width: 56px;
      height: 56px;
      border-radius: 6px;
      background: #e4e4e7;
      flex-shrink: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 1.2rem;
    }

    .product-info { flex: 1; min-width: 0; }

    .product-title {
      font-size: 0.875rem;
      font-weight: 600;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      margin-bottom: 2px;
    }

    .product-url {
      font-size: 0.75rem;
      color: #71717a;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .product-type {
      font-size: 0.7rem;
      color: #a1a1aa;
      border: 1px solid #e4e4e7;
      border-radius: 4px;
      padding: 1px 6px;
      flex-shrink: 0;
    }

    /* Feedback */
    #msg {
      position: fixed;
      bottom: 24px;
      right: 24px;
      background: #18181b;
      color: #fff;
      padding: 10px 18px;
      border-radius: 8px;
      font-size: 0.875rem;
      display: none;
      z-index: 100;
    }

    #msg.error { background: #ef4444; }
    #msg.success { background: #22c55e; }

    #empty { text-align: center; color: #a1a1aa; font-size: 0.875rem; padding: 24px; display: none; }

    .loading { text-align: center; color: #a1a1aa; font-size: 0.875rem; padding: 24px; }

    .tab-nav { background: #18181b; display: flex; gap: 2px; padding: 0 24px; }
    .tab-btn {
      background: transparent;
      border: none;
      border-bottom: 2px solid transparent;
      padding: 10px 16px;
      color: #a1a1aa;
      font-size: 0.875rem;
      font-weight: 600;
      cursor: pointer;
      transition: color .15s, border-color .15s;
    }
    .tab-btn:hover { color: #fff; }
    .tab-btn.active { color: #fff; border-bottom-color: #e63946; }
  </style>
</head>
<body>

<!-- Login -->
<div id="login-view">
  <div class="login-box">
    <h1>Promopobre Admin</h1>
    <div class="form-group" style="margin-bottom:12px">
      <label for="username">Usuario</label>
      <input type="text" id="username" autocomplete="username">
    </div>
    <div class="form-group" style="margin-bottom:20px">
      <label for="password">Senha</label>
      <input type="password" id="password" autocomplete="current-password">
    </div>
    <button class="btn-primary" id="btn-login" style="width:100%">Entrar</button>
  </div>
</div>

<!-- Admin -->
<div id="admin-view">
  <header>
    <span>Promopobre Admin</span>
    <button class="btn-ghost" id="btn-logout">Sair</button>
  </header>

  <nav class="tab-nav">
    <button class="tab-btn active" data-tab="produtos" onclick="setTab('produtos')">Produtos</button>
    <button class="tab-btn" data-tab="artigos" onclick="setTab('artigos')">Artigos</button>
  </nav>

  <main>
  <div id="tab-produtos">
    <!-- Adicionar produto -->
    <div class="card">
      <h2>Adicionar Produto</h2>
      <div class="form-row">
        <div class="form-group">
          <label for="f-url">URL do produto *</label>
          <input type="url" id="f-url" placeholder="https://amzn.to/...">
        </div>
        <div class="form-group">
          <label for="f-title">Titulo *</label>
          <input type="text" id="f-title" placeholder="Nome do produto">
        </div>
        <div class="form-group">
          <label for="f-image">URL da imagem *</label>
          <input type="url" id="f-image" placeholder="https://...jpg">
        </div>
      </div>
      <button class="btn-primary btn-add" id="btn-add">Salvar produto</button>
    </div>

    <!-- Adicionar em lote -->
    <div class="card">
      <h2>Adicionar em Lote</h2>
      <div id="bulk-rows"></div>
      <div style="display:flex;gap:8px;margin-top:10px;align-items:center">
        <button class="btn-ghost" id="btn-bulk-row" style="border:1px dashed #d4d4d8;border-radius:6px;padding:7px 14px;color:#71717a;font-size:0.8rem;font-weight:500">+ Linha</button>
        <button class="btn-primary" id="btn-bulk-save">Salvar lote</button>
      </div>
    </div>

    <!-- Lista -->
    <div class="card">
      <h2>Produtos cadastrados</h2>
      <input type="text" id="search" placeholder="Buscar por titulo ou URL...">
      <div id="bulk-bar" style="display:none;align-items:center;gap:10px;margin-bottom:10px;padding:8px 12px;background:#f4f4f5;border-radius:6px">
        <input type="checkbox" id="check-all" onchange="toggleSelectAll(this)" title="Selecionar todos" style="width:16px;height:16px;cursor:pointer;flex-shrink:0">
        <span id="sel-count" style="font-size:0.85rem;color:#52525b;flex:1"></span>
        <button class="btn-danger" id="btn-bulk-delete" onclick="bulkDelete()">Remover selecionados</button>
      </div>
      <div id="product-list"><div class="loading">Carregando...</div></div>
      <div id="empty">Nenhum produto encontrado.</div>
    </div>
  </div><!-- /tab-produtos -->

  <div id="tab-artigos" style="display:none">
    <!-- Artigos: lista -->
    <div class="card" id="articles-section">
      <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:16px">
        <h2 style="margin:0">Artigos</h2>
        <button class="btn-primary" id="btn-new-article">Novo Artigo</button>
      </div>
      <div id="article-list"><div class="loading">Carregando...</div></div>
      <div id="article-empty" style="display:none;text-align:center;color:#a1a1aa;font-size:0.875rem;padding:24px">Nenhum artigo publicado.</div>
    </div>

    <!-- Artigos: editor -->
    <div class="card" id="article-editor" style="display:none">
      <h2 id="editor-heading" style="margin-bottom:16px">Novo Artigo</h2>
      <div class="form-row" style="margin-bottom:12px">
        <div class="form-group">
          <label for="a-slug">Slug (URL) *</label>
          <input type="text" id="a-slug" placeholder="melhor-notebook-2025">
        </div>
        <div class="form-group">
          <label for="a-title">Título *</label>
          <input type="text" id="a-title" placeholder="Título do artigo">
        </div>
      </div>
      <div class="form-row" style="margin-bottom:12px">
        <div class="form-group">
          <label for="a-desc">Descrição (meta SEO)</label>
          <input type="text" id="a-desc" placeholder="Resumo que aparece no Google...">
        </div>
        <div class="form-group" style="max-width:180px">
          <label for="a-date">Data</label>
          <input type="text" id="a-date" placeholder="2025-06-04">
        </div>
      </div>
      <div class="form-group" style="margin-bottom:16px">
        <label for="a-image">Imagem de capa (URL)</label>
        <input type="url" id="a-image" placeholder="https://...jpg">
      </div>
      <div class="form-group" style="margin-bottom:16px">
        <label>Conteúdo *</label>
        <textarea id="a-content"></textarea>
      </div>
      <div style="display:flex;gap:10px">
        <button class="btn-primary" id="btn-save-article">Publicar</button>
        <button id="btn-cancel-article" style="background:transparent;border:1px solid #d4d4d8;border-radius:6px;padding:9px 18px;font-size:0.875rem;font-weight:600;cursor:pointer;color:#52525b">Cancelar</button>
      </div>
    </div>
  </div><!-- /tab-artigos -->

  </main>
</div>

<div id="msg"></div>

<script>
  // *** Coloque a URL do seu Cloudflare Worker aqui apos o deploy ***
  const WORKER_URL = 'https://promopobre.fabio-rodriguez.workers.dev';

  const $ = id => document.getElementById(id);
  let allProducts = [];
  let selectedUrls = new Set();

  function updateBulkBar() {
    const count = selectedUrls.size;
    const bar = $('bulk-bar');
    bar.style.display = allProducts.length ? 'flex' : 'none';
    $('sel-count').textContent = `${count} selecionado(s)`;
    $('btn-bulk-delete').disabled = count === 0;
    $('check-all').indeterminate = count > 0 && count < allProducts.length;
    $('check-all').checked = count > 0 && count === allProducts.length;
  }

  function toggleSelect(checkbox) {
    const url = decodeURIComponent(checkbox.value);
    if (checkbox.checked) selectedUrls.add(url);
    else selectedUrls.delete(url);
    updateBulkBar();
  }

  function toggleSelectAll(checkbox) {
    document.querySelectorAll('.product-check').forEach(cb => {
      cb.checked = checkbox.checked;
      const url = decodeURIComponent(cb.value);
      if (checkbox.checked) selectedUrls.add(url);
      else selectedUrls.delete(url);
    });
    updateBulkBar();
  }

  async function bulkDelete() {
    const urls = [...selectedUrls];
    if (!urls.length) return;
    if (!confirm(`Remover ${urls.length} produto(s) selecionado(s)?`)) return;
    $('btn-bulk-delete').disabled = true;
    try {
      const result = await api('/products/bulk', 'DELETE', { urls });
      showMsg(`${result.removed} produto(s) removido(s)${result.skipped ? `, ${result.skipped} nao encontrado(s)` : ''}.`);
      selectedUrls.clear();
      allProducts = allProducts.filter(i => !new Set(urls).has(getUrl(i)));
      renderList(filterBySearch(allProducts));
    } catch (e) {
      showMsg(e.message, 'error');
      $('btn-bulk-delete').disabled = false;
    }
  }

  function getToken() { return sessionStorage.getItem('admin_token'); }

  function showMsg(text, type = 'success') {
    const el = $('msg');
    el.textContent = text;
    el.className = type;
    el.style.display = 'block';
    setTimeout(() => { el.style.display = 'none'; }, 3000);
  }

  async function api(path, method = 'GET', body = null) {
    const opts = {
      method,
      headers: {
        'Content-Type': 'application/json',
        'Authorization': `Bearer ${getToken()}`
      }
    };
    if (body) opts.body = JSON.stringify(body);
    const res = await fetch(WORKER_URL + path, opts);
    const data = await res.json();
    if (!res.ok) throw new Error(data.error || `Erro ${res.status}`);
    return data;
  }

  function getUrl(item) { return typeof item === 'string' ? item : item.url; }
  function getTitle(item) { return typeof item === 'object' && item.title ? item.title : null; }
  function getImage(item) { return typeof item === 'object' && item.image ? item.image : null; }

  function renderList(items) {
    const list = $('product-list');
    const empty = $('empty');

    if (items.length === 0) {
      list.innerHTML = '';
      empty.style.display = 'block';
      return;
    }

    empty.style.display = 'none';
    list.innerHTML = items.map((item, idx) => {
      const url = getUrl(item);
      const title = getTitle(item) || url;
      const image = getImage(item);
      const isRich = typeof item === 'object' && item.title && item.image;
      const checked = selectedUrls.has(url) ? 'checked' : '';

      return `
        <div class="product-item" data-url="${encodeURIComponent(url)}">
          <input type="checkbox" class="product-check" value="${encodeURIComponent(url)}" ${checked} onchange="toggleSelect(this)" style="width:16px;height:16px;cursor:pointer;flex-shrink:0">
          ${image
            ? `<img src="${image}" alt="" onerror="this.style.display='none';this.nextElementSibling.style.display='flex'">`
            : ''
          }
          <div class="no-img" style="display:${image ? 'none' : 'flex'}">🔗</div>
          <div class="product-info">
            <div class="product-title" title="${title}">${title}</div>
            <div class="product-url">${url}</div>
          </div>
          <span class="product-type">${isRich ? 'rico' : 'link'}</span>
          <button class="btn-danger" onclick="deleteProduct('${encodeURIComponent(url)}')">Remover</button>
        </div>
      `;
    }).join('');

    updateBulkBar();
  }

  async function loadProducts() {
    $('product-list').innerHTML = '<div class="loading">Carregando...</div>';
    selectedUrls.clear();
    try {
      allProducts = await api('/products');
      renderList(allProducts);
    } catch (e) {
      $('product-list').innerHTML = '';
      showMsg(e.message, 'error');
    }
  }

  async function deleteProduct(encodedUrl) {
    const url = decodeURIComponent(encodedUrl);
    if (!confirm(`Remover este produto?\n\n${url}`)) return;
    try {
      await api('/products', 'DELETE', { url });
      allProducts = allProducts.filter(i => getUrl(i) !== url);
      renderList(filterBySearch(allProducts));
      showMsg('Produto removido.');
    } catch (e) {
      showMsg(e.message, 'error');
    }
  }

  function filterBySearch(items) {
    const q = $('search').value.toLowerCase().trim();
    if (!q) return items;
    return items.filter(item => {
      const url = getUrl(item).toLowerCase();
      const title = (getTitle(item) || '').toLowerCase();
      return url.includes(q) || title.includes(q);
    });
  }

  $('search').addEventListener('input', () => {
    renderList(filterBySearch(allProducts));
  });

  $('btn-add').addEventListener('click', async () => {
    const url   = $('f-url').value.trim();
    const title = $('f-title').value.trim();
    const image = $('f-image').value.trim();
    if (!url || !title || !image) { showMsg('Preencha todos os campos.', 'error'); return; }

    $('btn-add').disabled = true;
    try {
      await api('/products', 'POST', { url, title, image });
      allProducts.unshift({ url, title, image });
      renderList(filterBySearch(allProducts));
      $('f-url').value = $('f-title').value = $('f-image').value = '';
      showMsg('Produto adicionado!');
    } catch (e) {
      showMsg(e.message, 'error');
    } finally {
      $('btn-add').disabled = false;
    }
  });

  // --- Bulk add ---

  function addBulkRow() {
    const row = document.createElement('div');
    row.className = 'bulk-row';
    row.style.cssText = 'display:flex;gap:8px;align-items:center;margin-bottom:8px';
    row.innerHTML = `
      <input type="url"  placeholder="URL do produto" style="flex:2;border:1px solid #d4d4d8;border-radius:6px;padding:8px 10px;font-size:0.85rem;outline:none">
      <input type="text" placeholder="Titulo"         style="flex:2;border:1px solid #d4d4d8;border-radius:6px;padding:8px 10px;font-size:0.85rem;outline:none">
      <input type="url"  placeholder="URL da imagem"  style="flex:2;border:1px solid #d4d4d8;border-radius:6px;padding:8px 10px;font-size:0.85rem;outline:none">
      <button class="btn-danger" onclick="this.closest('.bulk-row').remove()" style="flex-shrink:0;padding:6px 10px">×</button>
    `;
    $('bulk-rows').appendChild(row);
  }

  for (let i = 0; i < 3; i++) addBulkRow();

  $('btn-bulk-row').addEventListener('click', addBulkRow);

  $('btn-bulk-save').addEventListener('click', async () => {
    const products = [...document.querySelectorAll('.bulk-row')].map(row => {
      const [url, title, image] = [...row.querySelectorAll('input')].map(i => i.value.trim());
      return { url, title, image };
    }).filter(p => p.url && p.title && p.image);

    if (products.length === 0) { showMsg('Preencha pelo menos uma linha completa.', 'error'); return; }

    $('btn-bulk-save').disabled = true;
    try {
      const result = await api('/products/bulk', 'POST', products);
      const msg = `${result.added} adicionado(s)${result.skipped ? `, ${result.skipped} ignorado(s) (URL ja existe)` : ''}`;
      showMsg(msg);
      document.querySelectorAll('.bulk-row input').forEach(i => i.value = '');
      loadProducts();
    } catch (e) {
      showMsg(e.message, 'error');
    } finally {
      $('btn-bulk-save').disabled = false;
    }
  });

  // --- Login ---

  $('btn-login').addEventListener('click', async () => {
    const username = $('username').value.trim();
    const password = $('password').value;
    if (!username || !password) return;

    $('btn-login').disabled = true;
    try {
      const res = await fetch(WORKER_URL + '/login', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ username, password })
      });
      const data = await res.json();
      if (!res.ok) throw new Error(data.error);
      sessionStorage.setItem('admin_token', data.token);
      $('login-view').style.display = 'none';
      $('admin-view').style.display = 'block';
      loadProducts();
    } catch (e) {
      showMsg(e.message || 'Erro ao fazer login', 'error');
    } finally {
      $('btn-login').disabled = false;
    }
  });

  $('password').addEventListener('keydown', e => {
    if (e.key === 'Enter') $('btn-login').click();
  });

  $('btn-logout').addEventListener('click', () => {
    sessionStorage.removeItem('admin_token');
    articlesLoaded = false;
    setTab('produtos');
    $('admin-view').style.display = 'none';
    $('login-view').style.display = 'flex';
    $('username').value = $('password').value = '';
  });

  // Se ja tem token valido, vai direto para o admin
  if (getToken()) {
    $('login-view').style.display = 'none';
    $('admin-view').style.display = 'block';
    loadProducts();
  }

  // --- Tabs ---

  let articlesLoaded = false;

  function setTab(tab) {
    document.querySelectorAll('.tab-btn').forEach(b => b.classList.toggle('active', b.dataset.tab === tab));
    $('tab-produtos').style.display = tab === 'produtos' ? '' : 'none';
    $('tab-artigos').style.display  = tab === 'artigos'  ? '' : 'none';
    if (tab === 'artigos' && !articlesLoaded) {
      loadArticles();
      articlesLoaded = true;
    }
    if (tab === 'produtos') closeEditor();
  }

  // --- Artigos ---

  let easyMDE;
  let editingSlug = null;

  function initEditor() {
    if (easyMDE) return;
    easyMDE = new EasyMDE({
      element: $('a-content'),
      spellChecker: false,
      autofocus: false,
      minHeight: '320px',
      toolbar: ['bold', 'italic', 'heading', '|', 'quote', 'unordered-list', 'ordered-list', '|', 'link', 'image', '|', 'preview', 'side-by-side', 'fullscreen']
    });
  }

  function renderArticleList(articles) {
    const list = $('article-list');
    const empty = $('article-empty');
    if (!articles.length) {
      list.innerHTML = '';
      empty.style.display = 'block';
      return;
    }
    empty.style.display = 'none';
    list.innerHTML = articles.map(a => `
      <div class="product-item" style="margin-bottom:8px">
        ${a.image ? `<img src="${a.image}" alt="" style="width:56px;height:56px;object-fit:cover;border-radius:6px;flex-shrink:0;background:#e4e4e7">` : '<div style="width:56px;height:56px;border-radius:6px;background:#e4e4e7;display:flex;align-items:center;justify-content:center;flex-shrink:0;font-size:1.2rem">📝</div>'}
        <div class="product-info">
          <div class="product-title">${a.title}</div>
          <div class="product-url">/artigos/${a.slug}/</div>
        </div>
        <span class="product-type">${a.date || ''}</span>
        <button class="btn-primary" style="padding:5px 12px;font-size:0.8rem;flex-shrink:0" onclick="editArticle('${a.slug}')">Editar</button>
        <button class="btn-danger" style="flex-shrink:0" onclick="deleteArticle('${a.slug}', '${a.title.replace(/'/g, "\\'")}')">Remover</button>
      </div>
    `).join('');
  }

  async function loadArticles() {
    $('article-list').innerHTML = '<div class="loading">Carregando...</div>';
    try {
      const articles = await api('/artigos');
      renderArticleList(articles);
    } catch (e) {
      $('article-list').innerHTML = '';
      showMsg(e.message, 'error');
    }
  }

  function openEditor(heading) {
    initEditor();
    $('editor-heading').textContent = heading;
    $('articles-section').style.display = 'none';
    $('article-editor').style.display = 'block';
    $('article-editor').scrollIntoView({ behavior: 'smooth', block: 'start' });
  }

  function closeEditor() {
    $('article-editor').style.display = 'none';
    $('articles-section').style.display = 'block';
    editingSlug = null;
    ['a-slug', 'a-title', 'a-desc', 'a-date', 'a-image'].forEach(id => $(''+id).value = '');
    if (easyMDE) easyMDE.value('');
    $('a-slug').readOnly = false;
  }

  $('btn-new-article').addEventListener('click', () => {
    editingSlug = null;
    openEditor('Novo Artigo');
    $('a-date').value = new Date().toISOString().split('T')[0];
  });

  $('btn-cancel-article').addEventListener('click', closeEditor);

  async function editArticle(slug) {
    editingSlug = slug;
    openEditor('Editar Artigo');
    $('a-slug').value = slug;
    $('a-slug').readOnly = true;
    if (easyMDE) easyMDE.value('Carregando...');

    try {
      const { content } = await api(`/artigo?slug=${slug}`);
      // Parse frontmatter
      const match = content.match(/^---\n([\s\S]*?)\n---\n\n?([\s\S]*)$/);
      if (match) {
        const fm = match[1];
        const body = match[2];
        $('a-title').value = (fm.match(/title:\s*"(.*)"/)?.[1] || '');
        $('a-desc').value  = (fm.match(/description:\s*"(.*)"/)?.[1] || '');
        $('a-date').value  = (fm.match(/date:\s*"(.*)"/)?.[1] || '');
        $('a-image').value = (fm.match(/image:\s*"(.*)"/)?.[1] || '');
        easyMDE.value(body);
      } else {
        easyMDE.value(content);
      }
    } catch (e) {
      showMsg(e.message, 'error');
      closeEditor();
    }
  }

  $('btn-save-article').addEventListener('click', async () => {
    const slug    = $('a-slug').value.trim();
    const title   = $('a-title').value.trim();
    const content = easyMDE ? easyMDE.value().trim() : '';

    if (!slug || !title || !content) {
      showMsg('Slug, título e conteúdo são obrigatórios.', 'error');
      return;
    }

    $('btn-save-article').disabled = true;
    try {
      await api('/artigos', 'POST', {
        slug,
        title,
        description: $('a-desc').value.trim(),
        date: $('a-date').value.trim(),
        image: $('a-image').value.trim(),
        content
      });
      showMsg('Artigo publicado! O HTML será gerado em instantes.');
      closeEditor();
      loadArticles();
    } catch (e) {
      showMsg(e.message, 'error');
    } finally {
      $('btn-save-article').disabled = false;
    }
  });

  async function deleteArticle(slug, title) {
    if (!confirm(`Remover o artigo "${title}"?`)) return;
    try {
      await api('/artigos', 'DELETE', { slug });
      showMsg('Artigo removido.');
      loadArticles();
    } catch (e) {
      showMsg(e.message, 'error');
    }
  }
</script>
<script src="https://unpkg.com/easymde/dist/easymde.min.js"></script>
</body>
</html>
