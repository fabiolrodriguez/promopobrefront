name: Build Articles

on:
  push:
    branches: [main]
    paths: ['artigos/*.md']

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - run: npm install

      - run: node scripts/build-articles.js

      - name: Commit HTML e sitemap gerados
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add artigos/ sitemap.xml
          git diff --staged --quiet || git commit -m "build: gera artigos e sitemap [skip ci]"
          git push
