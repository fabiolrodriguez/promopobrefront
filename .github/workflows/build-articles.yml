name: Build Articles

on:
  push:
    branches: [main]
    paths: ['artigos/*.md', 'links.json']
  workflow_dispatch:
  schedule:
    - cron: '0 12 * * *'  # meio-dia UTC = 9h BRT

concurrency:
  group: build-articles
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4
        with:
          ref: main

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - run: npm install

      - name: Pull latest antes de buildar
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git pull origin main

      - run: node scripts/expire-links.js

      - run: node scripts/build-products.js

      - run: node scripts/build-articles.js

      - name: Commit e push
        run: |
          git add -A
          git diff --staged --quiet || git commit -m "build: gera artigos e sitemap [skip ci]"
          git pull --rebase origin main
          git push
