name: Sync Mercado Livre

on:
  schedule:
    - cron: '0 */6 * * *'  # a cada 6 horas
  workflow_dispatch:        # permite rodar manualmente pelo GitHub

jobs:
  sync:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - run: pip install httpx

      - run: python scripts/sync.py

      - name: Commit produtos.json
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add produtos.json
          git diff --staged --quiet || git commit -m "sync: atualiza produtos.json"
          git push
