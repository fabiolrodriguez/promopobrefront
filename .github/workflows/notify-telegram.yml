name: Notify Telegram on links.json update

on:
  push:
    branches: [main]
    paths:
      - 'links.json'

jobs:
  notify:
    runs-on: ubuntu-latest
    steps:
      - name: Trigger n8n webhook
        env:
          WEBHOOK_URL: ${{ secrets.N8N_WEBHOOK_URL }}
        run: |
          CLEAN_URL=$(echo "$WEBHOOK_URL" | tr -d '[:space:]')
          curl -s -f -X POST "$CLEAN_URL" \
            -H "Content-Type: application/json" \
            -d '{"event":"links_updated","author":"${{ github.actor }}","commit":"${{ github.sha }}","raw_url":"https://raw.githubusercontent.com/${{ github.repository }}/main/links.json"}'
