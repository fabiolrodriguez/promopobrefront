      background: var(--header-bg);
      color: #fff;
      border: none;
      border-radius: 8px;
      font-size: 0.9rem;
      font-weight: 700;
      font-family: inherit;
      cursor: pointer;
      transition: background 0.15s;
    }

    button[type="submit"]:hover:not(:disabled) { background: #2a2a2e; }
    button[type="submit"]:disabled { opacity: 0.6; cursor: not-allowed; }

    .form-success {
      text-align: center;
      padding: 2rem;
      color: #16a34a;
      font-weight: 600;
      font-size: 0.95rem;
      background: #f0fdf4;
      border-radius: 12px;

    #form-erro {
      display: none;
      color: var(--accent);

      margin-top: 0.5rem;
      text-align: center;
    }

<main>
  <h2>Fale conosco</h2>
  <p class="subtitulo">Sugestões, dúvidas ou parcerias — respondemos em breve.</p>

  <form id="form-contato" novalidate>
    <input type="hidden" name="access_key" value="3dca8138-fa07-4cf5-81f0-b962d9bd1f80">
    <input type="hidden" name="from_name"  value="Promopobre - Contato">
    <input type="checkbox" name="botcheck" style="display:none">

    <div class="form-group">
      <label for="nome">Nome</label>
      <input id="nome" name="name" type="text" required placeholder="Seu nome">
    </div>
    <div class="form-group">
      <label for="email">E-mail</label>
      <input id="email" name="email" type="email" required placeholder="seu@email.com">
    </div>
    <div class="form-group">
      <label for="mensagem">Mensagem</label>
      <textarea id="mensagem" name="message" required placeholder="Como podemos ajudar?"></textarea>
    </div>

    <button type="submit">Enviar mensagem</button>
    <p id="form-erro">Erro ao enviar. Tente novamente.</p>
  </form>
</main>

<script>
  async function enviarContato(e) {
    e.preventDefault();
    const form = e.target;
    const btn  = form.querySelector('button[type="submit"]');
    const erro = document.getElementById('form-erro');

    btn.disabled    = true;
    btn.textContent = 'Enviando...';
    erro.style.display = 'none';

    try {
      const res  = await fetch('https://api.web3forms.com/submit', {
        method: 'POST',
        body: new FormData(form),
      });
      const json = await res.json();
      if (json.success) {
        form.innerHTML = '<p class="form-success">Mensagem enviada! Retornaremos em breve.</p>';
      } else {
        throw new Error();
      }
    } catch {
      btn.disabled    = false;
      btn.textContent = 'Enviar mensagem';
      erro.style.display = '';
    }
  }

  document.getElementById('form-contato').addEventListener('submit', enviarContato);
</script>
