<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{{title}} - Promopobre</title>
  <meta name="description" content="{{description}}">
  <meta name="robots" content="index, follow">
  <link rel="canonical" href="https://promopobre.com.br/artigos/{{slug}}/">
  <link rel="icon" type="image/png" href="/icon.png">

  <meta property="og:type"        content="article">
  <meta property="og:url"         content="https://promopobre.com.br/artigos/{{slug}}/">
  <meta property="og:title"       content="{{title}}">
  <meta property="og:description" content="{{description}}">
  {{og_image}}
  <meta property="og:locale"      content="pt_BR">

  <meta name="twitter:card"        content="summary_large_image">
  <meta name="twitter:title"       content="{{title}}">
  <meta name="twitter:description" content="{{description}}">

  {{schema_ld}}

  <style>
    :root {
      --accent: #e63946;
      --bg: #f4f4f5;
      --card: #ffffff;
      --text: #111827;
      --muted: #6b7280;
      --border: #e5e7eb;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
    }

    header {
      background: linear-gradient(135deg, var(--accent) 0%, #ff6b6b 100%);
      color: #fff;
      padding: 1.2rem 1rem;
      text-align: center;
    }

    header a { color: #fff; text-decoration: none; font-weight: 800; font-size: 1.3rem; }

    nav {
      max-width: 780px;
      margin: 0 auto;
      padding: 12px 1rem;
      font-size: 0.82rem;
      color: var(--muted);
    }

    nav a { color: var(--accent); text-decoration: none; }
    nav a:hover { text-decoration: underline; }

    main {
      max-width: 780px;
      margin: 0 auto;
      padding: 0 1rem 4rem;
    }

    article {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 2rem;
    }

    .article-meta {
      font-size: 0.82rem;
      color: var(--muted);
      margin-bottom: 1.5rem;
    }

    article h1 {
      font-size: 1.75rem;
      font-weight: 800;
      line-height: 1.3;
      margin-bottom: 0.5rem;
    }

    .cover-image {
      width: 100%;
      max-height: 360px;
      object-fit: cover;
      border-radius: 8px;
      margin-bottom: 1.5rem;
    }

    .content h2 { font-size: 1.25rem; font-weight: 700; margin: 1.8rem 0 0.6rem; }
    .content h3 { font-size: 1.05rem; font-weight: 700; margin: 1.4rem 0 0.5rem; }
    .content p  { line-height: 1.75; margin-bottom: 1rem; }
    .content ul, .content ol { padding-left: 1.5rem; margin-bottom: 1rem; }
    .content li { line-height: 1.75; margin-bottom: 0.25rem; }
    .content a  { color: var(--accent); }
    .content strong { font-weight: 700; }
    .content blockquote {
      border-left: 3px solid var(--border);
      padding-left: 1rem;
      color: var(--muted);
      margin: 1rem 0;
    }
    .content code {
      background: var(--bg);
      border-radius: 4px;
      padding: 2px 6px;
      font-size: 0.9em;
    }
    .content pre {
      background: var(--bg);
      border-radius: 8px;
      padding: 1rem;
      overflow-x: auto;
      margin-bottom: 1rem;
    }
    .content pre code { background: none; padding: 0; }
    .content img { max-width: 100%; border-radius: 6px; margin: 0.5rem 0; }
    .content table { width: 100%; border-collapse: collapse; margin-bottom: 1rem; font-size: 0.9rem; }
    .content th, .content td { border: 1px solid var(--border); padding: 8px 12px; text-align: left; }
    .content th { background: var(--bg); font-weight: 600; }
  </style>
</head>
<body>

<header>
  <a href="/">Promopobre</a>
</header>

<nav>
  <a href="/">Início</a> &rsaquo; <a href="/artigos/">Artigos</a> &rsaquo; {{title}}
</nav>

<main>
  <article>
    <h1>{{title}}</h1>
    <div class="article-meta">{{date_formatted}}</div>
    {{cover_image}}
    <div class="content">
      {{content}}
    </div>
  </article>
</main>

</body>
</html>
