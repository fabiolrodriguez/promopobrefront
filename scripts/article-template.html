<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{{title}} - Promopobre</title>
  <meta name="description" content="{{description}}">
  <meta name="robots" content="index, follow">
  <link rel="canonical" href="https://promopobre.com.br/artigos/{{slug}}/">
  <link rel="icon" type="image/png" href="/icon.png">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@700;800&display=swap" rel="stylesheet">

  <meta property="og:type"        content="article">
  <meta property="og:url"         content="https://promopobre.com.br/artigos/{{slug}}/">
  <meta property="og:title"       content="{{title}}">
  <meta property="og:description" content="{{description}}">
  {{og_image}}
  <meta property="og:locale"      content="pt_BR">

  <meta name="twitter:card"        content="summary_large_image">
  <meta name="twitter:title"       content="{{title}}">
  <meta name="twitter:description" content="{{description}}">

  {{schema_ld}}

  <style>
    :root {
      --accent: #D42B2B;
      --yellow: #FFD600;
      --header-bg: #0C0C0E;
      --bg: #F4F4F0;
      --card: #ffffff;
      --text: #0D0D0D;
      --muted: #696969;
      --border: #E4E4E0;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
    }

    header {
      background: var(--header-bg);
      color: #fff;
      padding: 1.2rem 1rem;
      text-align: center;
    }

    header a { color: #fff; text-decoration: none; font-weight: 800; font-size: 1.3rem; font-family: 'Space Grotesk', sans-serif; }

    nav {
      max-width: 780px;
      margin: 0 auto;
      padding: 12px 1rem;
      font-size: 0.82rem;
      color: var(--muted);
    }

    nav a { color: var(--accent); text-decoration: none; }
    nav a:hover { text-decoration: underline; }

    main {
      max-width: 780px;
      margin: 0 auto;
      padding: 0 1rem 4rem;
    }

    article {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 2rem;
    }

    .article-meta {
      font-size: 0.82rem;
      color: var(--muted);
      margin-bottom: 1.5rem;
    }

    article h1 {
      font-size: 1.75rem;
      font-weight: 800;
      line-height: 1.3;
      margin-bottom: 0.5rem;
    }

    .cover-image {
      width: 100%;
      max-height: 360px;
      object-fit: cover;
      border-radius: 8px;
      margin-bottom: 1.5rem;
    }

    .content h2 { font-size: 1.25rem; font-weight: 700; margin: 1.8rem 0 0.6rem; }
    .content h3 { font-size: 1.05rem; font-weight: 700; margin: 1.4rem 0 0.5rem; }
    .content p  { line-height: 1.75; margin-bottom: 1rem; }
    .content ul, .content ol { padding-left: 1.5rem; margin-bottom: 1rem; }
    .content li { line-height: 1.75; margin-bottom: 0.25rem; }
    .content a  { color: var(--accent); }
    .content strong { font-weight: 700; }
    .content blockquote {
      border-left: 3px solid var(--border);
      padding-left: 1rem;
      color: var(--muted);
      margin: 1rem 0;
    }
    .content code {
      background: var(--bg);
      border-radius: 4px;
      padding: 2px 6px;
      font-size: 0.9em;
    }
    .content pre {
      background: var(--bg);
      border-radius: 8px;
      padding: 1rem;
      overflow-x: auto;
      margin-bottom: 1rem;
    }
    .content pre code { background: none; padding: 0; }
    .content img { max-width: 100%; border-radius: 6px; margin: 0.5rem 0; }
    .content table { width: 100%; border-collapse: collapse; margin-bottom: 1rem; font-size: 0.9rem; }
    .content th, .content td { border: 1px solid var(--border); padding: 8px 12px; text-align: left; }
    .content th { background: var(--bg); font-weight: 600; }

    .related-articles { margin-top: 2.5rem; padding-top: 2rem; border-top: 1px solid var(--border); }
    .related-articles h2 { font-size: 1.05rem; font-weight: 700; margin-bottom: 1.25rem; }
    .related-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(180px, 1fr)); gap: 1rem; }
    .related-card { display: flex; flex-direction: column; text-decoration: none; color: var(--text); border: 1px solid var(--border); border-radius: 8px; overflow: hidden; transition: box-shadow .15s; }
    .related-card:hover { box-shadow: 0 4px 16px rgba(255, 214, 0, 0.15); }
    .related-card img { width: 100%; height: 110px; object-fit: cover; }
    .related-no-img { width: 100%; height: 110px; background: var(--bg); display: flex; align-items: center; justify-content: center; font-size: 1.8rem; }
    .related-info { padding: 0.65rem 0.75rem; }
    .related-title { display: block; font-size: 0.82rem; font-weight: 600; line-height: 1.4; margin-bottom: 0.25rem; }
    .related-date { font-size: 0.72rem; color: var(--muted); }
  </style>
</head>
<body>

<header>
  <a href="/">Promo<span style="color:#FFD600">pobre</span></a>
</header>

<nav>
  <a href="/">Início</a> &rsaquo; <a href="/artigos/">Artigos</a> &rsaquo; {{title}}
</nav>

<main>
  <article>
    <h1>{{title}}</h1>
    <div class="article-meta">{{date_formatted}}</div>
    {{cover_image}}
    <div class="content">
      {{content}}
    </div>
  </article>
  {{related_articles}}
</main>

</body>
</html>
