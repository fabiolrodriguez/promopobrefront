<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Promopobre - Ofertas e Descontos do Dia</title>
  <meta name="description" content="As melhores ofertas e descontos do dia em eletrônicos, smartphones, notebooks e muito mais. Atualizado diariamente.">
  <meta name="robots" content="index, follow">
  <link rel="canonical" href="https://promopobre.com.br">

  <meta property="og:type"        content="website">
  <meta property="og:url"         content="https://promopobre.com.br">
  <meta property="og:title"       content="Promopobre - Ofertas e Descontos do Dia">
  <meta property="og:description" content="As melhores ofertas e descontos do dia em eletrônicos, smartphones, notebooks e muito mais.">
  <meta property="og:locale"      content="pt_BR">

  <meta name="twitter:card"        content="summary">
  <meta name="twitter:title"       content="Promopobre - Ofertas e Descontos do Dia">
  <meta name="twitter:description" content="As melhores ofertas e descontos do dia em eletrônicos, smartphones, notebooks e muito mais.">
  <style>
    :root {
      --accent: #e63946;
      --accent-dark: #c1121f;
      --bg: #f4f4f5;
      --card: #ffffff;
      --text: #111827;
      --muted: #6b7280;
      --border: #e5e7eb;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
    }

    header {
      background: linear-gradient(135deg, var(--accent) 0%, #ff6b6b 100%);
      color: #fff;
      padding: 2.5rem 1rem 2rem;
      text-align: center;
    }
    header h1 { font-size: 2rem; font-weight: 800; letter-spacing: -0.5px; }
    header p  { margin-top: 0.4rem; font-size: 0.9rem; opacity: 0.88; }

    #status {
      text-align: center;
      padding: 1rem;
      font-size: 0.82rem;
      color: var(--muted);
      min-height: 2.5rem;
    }

    main { max-width: 1200px; margin: 0 auto; padding: 0 1rem 3rem; }

    #grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(240px, 1fr));
      gap: 1.25rem;
    }

    .card {
      background: var(--card);
      border-radius: 14px;
      overflow: hidden;
      box-shadow: 0 1px 6px rgba(0,0,0,0.07);
      display: flex;
      flex-direction: column;
      transition: transform 0.2s, box-shadow 0.2s;
    }
    .card:hover {
      transform: translateY(-4px);
      box-shadow: 0 8px 28px rgba(0,0,0,0.13);
    }

    .card-img-wrap {
      position: relative;
      aspect-ratio: 1 / 1;
      background: var(--border);
      overflow: hidden;
    }
    .card-img-wrap img {
      width: 100%;
      height: 100%;
      object-fit: cover;
    }
    .img-placeholder {
      width: 100%;
      height: 100%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 2.5rem;
    }
    .badge-desconto {
      position: absolute;
      top: 0.5rem;
      left: 0.5rem;
      background: var(--accent);
      color: #fff;
      font-size: 0.72rem;
      font-weight: 700;
      padding: 0.2rem 0.45rem;
      border-radius: 5px;
    }

    .card-body {
      padding: 0.875rem 1rem 0.5rem;
      flex: 1;
      display: flex;
      flex-direction: column;
      gap: 0.35rem;
    }
    .card-source {
      font-size: 0.7rem;
      font-weight: 600;
      color: var(--accent);
      text-transform: uppercase;
      letter-spacing: 0.04em;
    }
    .card-title {
      font-size: 0.88rem;
      font-weight: 600;
      line-height: 1.4;
      display: -webkit-box;
      -webkit-line-clamp: 3;
      -webkit-box-orient: vertical;
      overflow: hidden;
    }
    .card-desc {
      font-size: 0.78rem;
      color: var(--muted);
      line-height: 1.45;
      display: -webkit-box;
      -webkit-line-clamp: 2;
      -webkit-box-orient: vertical;
      overflow: hidden;
    }
    .card-precos {
      margin-top: auto;
      padding-top: 0.4rem;
    }
    .preco-original {
      font-size: 0.75rem;
      color: var(--muted);
      text-decoration: line-through;
    }
    .preco-atual {
      font-size: 1.1rem;
      font-weight: 800;
      color: var(--accent);
    }

    .card-footer { padding: 0.75rem 1rem 1rem; }

    .btn {
      display: block;
      background: var(--accent);
      color: #fff;
      text-align: center;
      padding: 0.6rem 1rem;
      border-radius: 8px;
      text-decoration: none;
      font-weight: 700;
      font-size: 0.85rem;
      transition: background 0.15s;
    }
    .btn:hover { background: var(--accent-dark); }

    /* Skeleton */
    .skeleton .card-img-wrap,
    .skeleton .skel {
      background: linear-gradient(90deg, #e5e7eb 25%, #f3f4f6 50%, #e5e7eb 75%);
      background-size: 200% 100%;
      animation: shimmer 1.4s infinite;
      border-radius: 6px;
    }
    .skel { height: 0.85rem; margin-bottom: 0.5rem; }
    .skel.w60 { width: 60%; }
    .skel.w80 { width: 80%; }
    .skel.btn-skel { height: 2.2rem; border-radius: 8px; margin: 0; }

    @keyframes shimmer {
      0%   { background-position: 200% 0; }
      100% { background-position: -200% 0; }
    }
  </style>
</head>
<body>

<header>
  <h1>Promopobre</h1>
  <p>As melhores ofertas selecionadas para voce</p>
</header>

<p id="status">Carregando ofertas...</p>

<main>
  <div id="grid"></div>
</main>

<script>
  const CACHE_TTL = 24 * 60 * 60 * 1000;

  // ── Utilitários ──────────────────────────────────────────────

  function esc(s) {
    return String(s || '')
      .replace(/&/g, '&amp;').replace(/"/g, '&quot;')
      .replace(/</g, '&lt;').replace(/>/g, '&gt;');
  }

  function brl(v) {
    return Number(v).toLocaleString('pt-BR', { style: 'currency', currency: 'BRL' });
  }

  function hostname(url) {
    try { return new URL(url).hostname.replace('www.', ''); }
    catch { return url; }
  }

  function titleFromSlug(url) {
    try {
      const slug = new URL(url).pathname.split('/').filter(Boolean).pop() || '';
      const name = slug.replace(/-i\.\d+\.\d+$/, '').replace(/-/g, ' ').trim();
      return name.length > 3 ? name : null;
    } catch { return null; }
  }

  // ── Cache microlink ──────────────────────────────────────────

  function getCached(url) {
    try {
      const raw = localStorage.getItem('prev:' + url);
      if (!raw) return null;
      const { data, ts } = JSON.parse(raw);
      return Date.now() - ts < CACHE_TTL ? data : null;
    } catch { return null; }
  }

  function setCache(url, data) {
    try {
      localStorage.setItem('prev:' + url, JSON.stringify({ data, ts: Date.now() }));
    } catch {}
  }

  async function fetchPreview(url) {
    const cached = getCached(url);
    if (cached) return cached;
    const res  = await fetch('https://api.microlink.io/?url=' + encodeURIComponent(url));
    const json = await res.json();
    if (json.status === 'success') { setCache(url, json.data); return json.data; }
    return null;
  }

  // ── Card unificado ───────────────────────────────────────────
  // Aceita campos opcionais: desc, preco, preco_original, desconto_pct

  function renderCard({ titulo, link, imagem, loja, desc, preco, preco_original, desconto_pct }) {
    return `
      <div class="card">
        <div class="card-img-wrap">
          ${imagem
            ? `<img src="${esc(imagem)}" alt="${esc(titulo)}" loading="lazy"
                    onerror="this.parentElement.style.display='none'">`
            : `<div class="img-placeholder">🛒</div>`
          }
          ${desconto_pct ? `<span class="badge-desconto">-${desconto_pct}%</span>` : ''}
        </div>
        <div class="card-body">
          <span class="card-source">${esc(loja)}</span>
          <p class="card-title">${esc(titulo)}</p>
          ${desc ? `<p class="card-desc">${esc(desc)}</p>` : ''}
          ${preco != null ? `
            <div class="card-precos">
              ${preco_original ? `<p class="preco-original">${brl(preco_original)}</p>` : ''}
              <p class="preco-atual">${brl(preco)}</p>
            </div>` : ''}
        </div>
        <div class="card-footer">
          <a class="btn" href="${esc(link)}" target="_blank" rel="noopener noreferrer">Ver oferta &rarr;</a>
        </div>
      </div>`;
  }

  function skeletonHTML() {
    return `
      <div class="card skeleton">
        <div class="card-img-wrap"></div>
        <div class="card-body">
          <div class="skel w60"></div>
          <div class="skel w80"></div>
          <div class="skel w60"></div>
        </div>
        <div class="card-footer"><div class="skel btn-skel"></div></div>
      </div>`;
  }

  // Normaliza entrada do links.json: aceita string ou {url, image?, title?, description?}
  function normalize(entry) {
    return typeof entry === 'string' ? { url: entry } : entry;
  }

  // ── Init ─────────────────────────────────────────────────────

  async function init() {
    const grid   = document.getElementById('grid');
    const status = document.getElementById('status');

    // Carrega as duas fontes em paralelo; falha de uma nao afeta a outra
    const [produtos, linksRaw] = await Promise.all([
      fetch('produtos.json').then(r => r.json()).catch(() => []),
      fetch('links.json').then(r => r.json()).catch(() => []),
    ]);

    const links = linksRaw.map(normalize);
    const total = produtos.length + links.length;

    if (!total) {
      status.textContent = 'Nenhuma oferta disponivel no momento.';
      return;
    }

    // Produtos do sync (dados completos): renderiza imediatamente
    // Links manuais: renderiza skeleton enquanto busca microlink
    grid.innerHTML =
      produtos.map(p => renderCard(p)).join('') +
      links.map((_, i) => `<div id="l${i}">${skeletonHTML()}</div>`).join('');

    status.textContent = 'Carregando...';

    // Resolve previews dos links manuais
    let resolvidos = 0;
    await Promise.all(links.map(async ({ url, image, title, description }, i) => {
      let data = null;
      try { data = await fetchPreview(url); } catch {}

      if (image)       data = { ...data, image: { url: image } };
      if (title)       data = { ...data, title };
      if (description) data = { ...data, description };

      document.getElementById(`l${i}`).innerHTML = renderCard({
        titulo: data?.title || titleFromSlug(url) || hostname(url),
        link:   url,
        imagem: data?.image?.url || '',
        loja:   hostname(url),
        desc:   data?.description || '',
      });

      resolvidos++;
      if (resolvidos === links.length) {
        status.textContent = `${total} oferta${total !== 1 ? 's' : ''} encontrada${total !== 1 ? 's' : ''}`;
      }
    }));

    if (!links.length) {
      status.textContent = `${total} oferta${total !== 1 ? 's' : ''} encontrada${total !== 1 ? 's' : ''}`;
    }

    injectStructuredData(produtos);
  }

  function injectStructuredData(produtos) {
    if (!produtos.length) return;
    const script = document.createElement('script');
    script.type = 'application/ld+json';
    script.textContent = JSON.stringify({
      "@context": "https://schema.org",
      "@type": "ItemList",
      "name": "Ofertas do Dia - Promopobre",
      "url": "https://promopobre.com.br",
      "numberOfItems": produtos.length,
      "itemListElement": produtos.map((p, i) => ({
        "@type": "ListItem",
        "position": i + 1,
        "item": {
          "@type": "Product",
          "name": p.titulo,
          "image": p.imagem,
          "url": p.link,
          "offers": {
            "@type": "Offer",
            "price": p.preco,
            "priceCurrency": "BRL",
            "availability": "https://schema.org/InStock",
            "url": p.link
          }
        }
      }))
    });
    document.head.appendChild(script);
  }

  init();
</script>

</body>
</html>
